<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />

  <!-- PWA Meta Tags -->
  <title>Lior</title>
  <meta name="description" content="A private memory app for couples.">
  <!-- Theme-color blends Android Chrome address bar + nav bar with the app background -->
  <meta name="theme-color" content="#F8E7EC" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1A0F14" media="(prefers-color-scheme: dark)">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' 'unsafe-inline' https://esm.sh; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://esm.sh https://fonts.googleapis.com https://fonts.gstatic.com https://lior-media.joinlior.workers.dev; media-src 'self' data: blob: https://*.supabase.co https://lior-media.joinlior.workers.dev; worker-src 'self' blob:;">
  <link rel="manifest" href="/manifest.json">

  <!-- iOS Specific PWA config -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lior">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <!-- Prevent auto-zooming on inputs -->
  <meta name="format-detection" content="telephone=no">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Afacad+Flux:wght@400;500;600;700;800&family=Bricolage+Grotesque:wght@500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- Tailwind CSS is now handled via PostCSS/Build step -->
  <style>
    :root {
      --color-lior-50: #f8f9fb;
      --color-lior-100: #eef2f6;
      --color-lior-200: #e2e8f0;
      --color-lior-300: #cbd5e1;
      --color-lior-400: #94a3b8;
      --color-lior-500: #f43f5e;
      --color-lior-600: #e11d48;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      /* Match the gradient start so Android Chrome's collapsed address bar +
         bottom gesture pill blend with the app instead of showing a hard band */
      background-color: #F8E7EC;
      color: #1e293b;
    }

    html {
      /* Use the largest viewport height so iOS Safari + Android Chrome
         visually expand into the URL bar / gesture nav once the user scrolls. */
      height: 100dvh;
      height: 100lvh;
    }

    body {
      overscroll-behavior: none;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-tap-highlight-color: transparent;
      /* Prevent rubber-band white flash on iOS by matching bg */
      background: linear-gradient(168deg, #F8E7EC 0%, #EBD4DB 50%, #DEBFC9 100%);
      /* Allow the page to draw under the iOS dynamic island / status bar */
      padding: 0;
    }

    #root {
      width: 100%;
      height: 100%;
      min-height: 100dvh;
    }

    .pb-safe {
      padding-bottom: env(safe-area-inset-bottom);
    }

    .pt-safe {
      padding-top: clamp(1.5rem, env(safe-area-inset-top, 1.5rem), 3rem);
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .ease-spring {
      transition-timing-function: cubic-bezier(0.32, 0.72, 0, 1);
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "date-fns": "https://esm.sh/date-fns@^4.1.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.89.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "framer-motion": "https://esm.sh/framer-motion@11.16.1",
    "three": "https://esm.sh/three@0.172.0"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body ontouchstart="">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
