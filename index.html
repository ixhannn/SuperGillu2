<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />

  <!-- PWA Meta Tags -->
  <title>Lior</title>
  <meta name="description" content="A private memory app for couples.">
  <!-- Theme-color blends Android Chrome address bar + nav bar with the app background -->
  <meta name="theme-color" content="#F8E7EC" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1A0F14" media="(prefers-color-scheme: dark)">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://fonts.googleapis.com https://fonts.gstatic.com https://lior-media.joinlior.workers.dev; media-src 'self' data: blob: https://*.supabase.co https://lior-media.joinlior.workers.dev; worker-src 'self' blob:;">
  <link rel="manifest" href="/manifest.json">

  <!-- E2E only: hidden windows freeze requestAnimationFrame, which stalls
       framer-motion exits/transitions and makes animation-dependent flows
       untestable in headless preview harnesses. MessageChannel messages are
       NOT throttled in hidden pages, so this shim keeps the frameloop alive.
       Compiled out of meaning unless the build sets VITE_E2E=1 AND the page
       is opened with ?e2e=1 while hidden. Must run before the app bundle so
       framer captures the shimmed rAF at module init. -->
  <script>
    (function () {
      if ('%VITE_E2E%' !== '1') return;
      if (!/[?&]e2e=1/.test(location.search)) return;
      if (document.visibilityState !== 'hidden') return;
      var queue = [];
      var cancelled = new Set();
      var scheduled = false;
      var nextId = 1;
      var last = performance.now();
      var channel = new MessageChannel();
      channel.port1.onmessage = function () {
        var now = performance.now();
        if (now - last < 12) { channel.port2.postMessage(null); return; }
        last = now;
        scheduled = false;
        var jobs = queue; queue = [];
        for (var i = 0; i < jobs.length; i++) {
          if (cancelled.has(jobs[i].id)) { cancelled.delete(jobs[i].id); continue; }
          try { jobs[i].cb(now); } catch (e) { /* keep the loop alive */ }
        }
      };
      window.requestAnimationFrame = function (cb) {
        var id = nextId++;
        queue.push({ id: id, cb: cb });
        if (!scheduled) { scheduled = true; channel.port2.postMessage(null); }
        return id;
      };
      window.cancelAnimationFrame = function (id) { cancelled.add(id); };
      // WAAPI timelines are compositor-driven and also freeze when hidden —
      // animation.finished never resolves, which deadlocks AnimatePresence
      // mode="wait". The app also calls el.animate() directly, so the API
      // must exist: replace it with an instant-finish fake that applies the
      // final keyframe and resolves via timers (which still run when hidden).
      try {
        Element.prototype.animate = function (keyframes) {
          var el = this;
          try {
            var last = Array.isArray(keyframes) ? keyframes[keyframes.length - 1] : keyframes;
            if (last) {
              for (var k in last) {
                if (k !== 'offset' && k !== 'easing' && k !== 'composite') el.style[k] = last[k];
              }
            }
          } catch (e) { }
          var finishListeners = [];
          var anim = {
            currentTime: 0,
            playState: 'running',
            playbackRate: 1,
            onfinish: null,
            oncancel: null,
            effect: { getComputedTiming: function () { return { duration: 0, progress: 1 }; } },
            play: function () { }, pause: function () { }, reverse: function () { },
            persist: function () { }, commitStyles: function () { },
            cancel: function () { anim.playState = 'idle'; if (anim.oncancel) try { anim.oncancel(); } catch (e) { } },
            finish: function () { anim.playState = 'finished'; if (anim.onfinish) try { anim.onfinish(); } catch (e) { } },
            addEventListener: function (type, fn) { if (type === 'finish') finishListeners.push(fn); },
            removeEventListener: function () { },
          };
          anim.finished = new Promise(function (resolve) {
            setTimeout(function () {
              anim.playState = 'finished';
              if (anim.onfinish) try { anim.onfinish(); } catch (e) { }
              for (var i = 0; i < finishListeners.length; i++) { try { finishListeners[i](); } catch (e) { } }
              resolve(anim);
            }, 30);
          });
          return anim;
        };
      } catch (e) { }
    })();
  </script>

  <!-- iOS Specific PWA config -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lior">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <!-- Prevent auto-zooming on inputs -->
  <meta name="format-detection" content="telephone=no">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Afacad+Flux:wght@400;500;600;700;800&family=Bricolage+Grotesque:wght@500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- Tailwind CSS is now handled via PostCSS/Build step -->
  <style>
    :root {
      --color-lior-50: #f8f9fb;
      --color-lior-100: #eef2f6;
      --color-lior-200: #e2e8f0;
      --color-lior-300: #cbd5e1;
      --color-lior-400: #94a3b8;
      --color-lior-500: #f43f5e;
      --color-lior-600: #e11d48;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      /* Match the gradient start so Android Chrome's collapsed address bar +
         bottom gesture pill blend with the app instead of showing a hard band */
      background-color: #F8E7EC;
      color: #1e293b;
    }

    html {
      /* Use the largest viewport height so iOS Safari + Android Chrome
         visually expand into the URL bar / gesture nav once the user scrolls. */
      height: 100dvh;
      height: 100lvh;
    }

    body {
      overscroll-behavior: none;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-tap-highlight-color: transparent;
      /* Prevent rubber-band white flash on iOS by matching bg */
      background: linear-gradient(168deg, #F8E7EC 0%, #EBD4DB 50%, #DEBFC9 100%);
      /* Allow the page to draw under the iOS dynamic island / status bar */
      padding: 0;
    }

    #root {
      width: 100%;
      height: 100%;
      min-height: 100dvh;
    }

    .pb-safe {
      padding-bottom: env(safe-area-inset-bottom);
    }

    .pt-safe {
      padding-top: clamp(1.5rem, env(safe-area-inset-top, 1.5rem), 3rem);
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .ease-spring {
      transition-timing-function: cubic-bezier(0.32, 0.72, 0, 1);
    }
  </style>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
