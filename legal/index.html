<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lior · Legal</title>
<meta name="description" content="Lior privacy policy and account deletion.">
<style>
  :root{--ground:#FAF6F2;--ink:#2B2229;--muted:#6E656B;--line:#ECE3DD;--wine:#A83252;--card:#FFFFFF;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--ground);color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.7;font-size:16px;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .wrap{max-width:520px;width:100%;padding:40px 24px;text-align:center}
  .brand{display:inline-flex;align-items:center;gap:9px;margin-bottom:20px}
  .brand .dot{width:11px;height:11px;border-radius:50%;background:var(--wine)}
  .brand b{font-weight:700;letter-spacing:.02em;font-size:1.15rem}
  h1{font-size:1.5rem;margin:0 0 8px;letter-spacing:-.01em}
  p.sub{color:var(--muted);margin:0 0 30px}
  .links{display:flex;flex-direction:column;gap:12px;text-align:left}
  .links a{display:flex;align-items:center;justify-content:space-between;
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:17px 20px;text-decoration:none;color:var(--ink);font-weight:600;
    transition:border-color .15s,transform .05s}
  .links a:hover{border-color:var(--wine);transform:translateY(-1px)}
  .links a .arw{color:var(--wine);font-size:1.2rem}
  .links a small{display:block;font-weight:400;color:var(--muted);font-size:.82rem;margin-top:2px}
  .tail{margin-top:30px;color:var(--muted);font-size:.8rem;opacity:.8}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><span class="dot"></span><b>Lior</b></div>
  <h1>Legal &amp; Privacy</h1>
  <p class="sub">A private space for two.</p>
  <div class="links">
    <a href="privacy.html"><span>Privacy Policy<small>How we collect, store, and protect your data</small></span><span class="arw">&rarr;</span></a>
    <a href="account-deletion.html"><span>Account &amp; Data Deletion<small>How to delete your account and all your data</small></span><span class="arw">&rarr;</span></a>
  </div>
  <p class="tail">Questions? <a href="mailto:support.lior@gmail.com" style="color:var(--wine)">support.lior@gmail.com</a></p>
</div>
</body>
</html>
