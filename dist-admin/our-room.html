<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Our Room ♡ Tulika</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --coral:#FF6B6B;--golden:#FFD93D;--lav:#C77DFF;--mint:#6BCB77;--pink:#FF85A1;
  --sky:#74B9FF;--peach:#FFAB91;--dark:#1A0828;
  --c-furn:#FF8A65;--c-dec:#FFD54F;--c-plt:#66BB6A;--c-lit:#CE93D8;--c-cozy:#64B5F6;--c-sp:#F48FB1;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
body{font-family:'Nunito',sans-serif;background:#0d0820;overflow:hidden;width:100vw;height:100dvh;display:flex;flex-direction:column;}

/* ROOM */
#room-wrap{flex:1;position:relative;overflow:hidden;min-height:0;}
#room-bg{position:absolute;inset:0;width:100%;height:100%;}
#items-layer{position:absolute;inset:0;pointer-events:none;}
.placed-item{position:absolute;cursor:grab;pointer-events:auto;transform-origin:center bottom;}
.placed-item:active{cursor:grabbing;}
.placed-item.dragging{cursor:grabbing;z-index:9999!important;}
.placed-item svg{display:block;filter:drop-shadow(0 5px 10px rgba(0,0,0,0.3));}
.placed-item.dragging svg{filter:drop-shadow(0 14px 28px rgba(0,0,0,0.5)) brightness(1.12);}

/* TOP BAR */
#top-bar{position:absolute;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;pointer-events:none;}
#room-label-wrap{pointer-events:auto;background:rgba(255,255,255,0.12);backdrop-filter:blur(12px);border:1.5px solid rgba(255,255,255,0.25);border-radius:100px;padding:6px 14px;display:flex;align-items:center;gap:6px;}
#room-name{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:13px;color:rgba(255,255,255,0.95);outline:none;min-width:30px;text-shadow:0 1px 4px rgba(0,0,0,0.4);}
#room-name:focus{border-bottom:1.5px dashed rgba(255,255,255,0.5);}
#top-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;pointer-events:auto;}
#coin-display{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,0.5);backdrop-filter:blur(14px);border:1.5px solid rgba(255,215,0,0.35);border-radius:100px;padding:5px 12px 5px 8px;}
#coin-amount{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:17px;color:var(--golden);min-width:36px;text-align:right;}
#coin-amount.bounce{animation:coinBounce 0.4s cubic-bezier(.34,1.56,.64,1);}
@keyframes coinBounce{0%{transform:scale(1)}50%{transform:scale(1.45) rotate(-6deg)}100%{transform:scale(1)}}
#earn-btn{background:linear-gradient(135deg,#FFD700,#FFA000);border:none;border-radius:100px;width:30px;height:30px;font-size:16px;font-weight:900;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(255,160,0,0.5);font-family:'Nunito',sans-serif;line-height:1;}
#earn-btn:active{transform:scale(0.88);}
#room-ctrls{display:flex;gap:5px;}
.ctrl-btn{background:rgba(255,255,255,0.12);backdrop-filter:blur(10px);border:1.5px solid rgba(255,255,255,0.2);border-radius:10px;padding:5px 9px;font-size:10px;font-weight:800;color:rgba(255,255,255,0.9);cursor:pointer;font-family:'Nunito',sans-serif;transition:transform .15s,background .15s;}
.ctrl-btn:active{transform:scale(0.9);}
#share-btn{background:linear-gradient(135deg,rgba(255,107,107,0.25),rgba(199,125,255,0.25));border:1.5px solid rgba(255,107,107,0.4);border-radius:100px;padding:5px 12px;font-size:10px;font-weight:800;color:rgba(255,255,255,0.85);cursor:pointer;font-family:'Nunito',sans-serif;}
#share-btn:active{transform:scale(0.92);}

/* WATERMARK */
#wm{position:absolute;bottom:10px;right:14px;font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);z-index:10;pointer-events:none;}

/* LIGHT OVERLAY */
#light-ov{position:absolute;inset:0;pointer-events:none;z-index:5;mix-blend-mode:screen;opacity:0.18;transition:background 1s ease;}

/* AVATARS */
#avatars{position:absolute;z-index:20;pointer-events:none;bottom:38%;left:50%;transform:translateX(-50%);}

/* SHOP TOGGLE */
#shop-toggle{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:200;background:linear-gradient(135deg,#FF6B6B,#FF4081);border:none;border-radius:100px;padding:12px 26px;font-family:'Baloo 2',sans-serif;font-weight:800;font-size:14px;color:white;cursor:pointer;box-shadow:0 6px 22px rgba(255,64,129,0.5);display:flex;align-items:center;gap:8px;transition:transform .25s cubic-bezier(.34,1.56,.64,1),opacity .2s;}
#shop-toggle:active{transform:translateX(-50%) scale(0.9);}
#shop-toggle.hidden{opacity:0;pointer-events:none;transform:translateX(-50%) translateY(16px);}

/* SHOP PANEL */
#shop-panel{position:fixed;left:0;right:0;bottom:0;z-index:300;height:0;overflow:hidden;transition:height .4s cubic-bezier(.34,1.56,.64,1);border-radius:22px 22px 0 0;background:#130822;border-top:2px solid rgba(255,255,255,0.1);box-shadow:0 -8px 40px rgba(0,0,0,0.6);}
#shop-panel.open{height:60vh;}
#shop-inner{height:100%;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom,0);}
#shop-hdr{padding:14px 18px 8px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#shop-hdr h2{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:19px;color:white;}
#shop-hdr .coins-info{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:800;color:var(--golden);}
#close-shop{background:rgba(255,255,255,0.1);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.65);font-size:15px;font-family:'Nunito',sans-serif;}
#cat-tabs{display:flex;gap:7px;padding:0 16px 10px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
#cat-tabs::-webkit-scrollbar{display:none;}
.cat-tab{flex-shrink:0;padding:6px 14px;border-radius:100px;border:1.5px solid rgba(255,255,255,0.14);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.55);font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:4px;}
.cat-tab.active{border-color:var(--tc,white);background:color-mix(in srgb,var(--tc,white) 18%,transparent);color:var(--tc,white);}
#items-grid{flex:1;overflow-y:auto;overflow-x:hidden;padding:4px 14px 14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:9px;align-content:start;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.18) transparent;}
#items-grid::-webkit-scrollbar{width:4px;}
#items-grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.18);border-radius:2px;}
.item-card{background:rgba(255,255,255,0.055);border:1.5px solid rgba(255,255,255,0.1);border-radius:16px;padding:10px 8px 8px;cursor:pointer;transition:transform .22s cubic-bezier(.34,1.56,.64,1),border-color .2s,background .2s;display:flex;flex-direction:column;align-items:center;gap:5px;position:relative;overflow:hidden;}
.item-card:hover{transform:scale(1.06);border-color:rgba(255,255,255,0.28);background:rgba(255,255,255,0.1);}
.item-card:active{transform:scale(0.94);}
.item-card.cant-afford{opacity:0.42;}
.item-prev{width:76px;height:76px;display:flex;align-items:center;justify-content:center;}
.item-prev svg{width:100%;height:100%;overflow:visible;}
.item-name{font-size:10px;font-weight:800;color:white;text-align:center;line-height:1.2;}
.item-cost{display:flex;align-items:center;gap:3px;font-size:11px;font-weight:800;color:var(--golden);}
.rarity-badge{position:absolute;top:5px;right:5px;font-size:7.5px;font-weight:800;padding:2px 5px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em;}
.rc{background:rgba(158,158,158,.18);color:#BDBDBD;}
.rr{background:rgba(66,165,245,.18);color:#64B5F6;}
.rl{background:rgba(255,107,107,.18);color:#FF8A80;}

/* PARTICLES */
#particle-layer{position:fixed;inset:0;pointer-events:none;z-index:1000;overflow:hidden;}
.coin-p{position:absolute;font-size:18px;animation:coinFall 1.1s ease-in forwards;}
@keyframes coinFall{0%{transform:translateY(0) rotate(0) scale(1);opacity:1}100%{transform:translateY(110px) rotate(400deg) scale(0.4);opacity:0}}
.poof-p{position:absolute;width:7px;height:7px;border-radius:50%;animation:poofBurst .5s ease-out forwards;}
@keyframes poofBurst{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}

/* ANIMATIONS */
@keyframes placeSettle{0%{transform:scale(1.3)}55%{transform:scale(0.91)}80%{transform:scale(1.06)}100%{transform:scale(1)}}
.settling{animation:placeSettle .45s cubic-bezier(.34,1.56,.64,1) forwards;}
.floor-ripple{position:absolute;border:2px solid rgba(255,255,255,0.35);border-radius:50%;animation:rippleGo .55s ease-out forwards;pointer-events:none;}
@keyframes rippleGo{0%{width:0;height:0;opacity:1;transform:translate(-50%,-50%)}100%{width:90px;height:32px;opacity:0;transform:translate(-50%,-50%)}}

/* ITEM IDLE ANIMS */
@keyframes twinkle{0%,100%{opacity:1}50%{opacity:.15}}
@keyframes flicker{0%,100%{transform:scaleX(1) scaleY(1);opacity:1}25%{transform:scaleX(1.12) scaleY(.88);opacity:.9}50%{transform:scaleX(.9) scaleY(1.12);opacity:.95}75%{transform:scaleX(1.06) scaleY(.94)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes fbob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes swim{0%{transform:translateX(-6px)}50%{transform:translateX(6px)}100%{transform:translateX(-6px)}}
@keyframes swirl{from{transform:rotate(0) }to{transform:rotate(360deg)}}
@keyframes bounceIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes shimRot{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes waveHand{0%,100%{transform:rotate(0)}30%{transform:rotate(-25deg)}60%{transform:rotate(15deg)}}

/* CONTEXT MENU */
#ctx-menu{position:fixed;z-index:500;background:rgba(20,10,40,0.97);backdrop-filter:blur(14px);border:1.5px solid rgba(255,255,255,0.15);border-radius:12px;padding:5px;display:none;min-width:130px;}
#ctx-menu.vis{display:block;}
#ctx-menu button{display:block;width:100%;padding:8px 14px;background:none;border:none;border-radius:8px;color:rgba(255,255,255,0.88);font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;cursor:pointer;text-align:left;transition:background .15s;}
#ctx-menu button:hover{background:rgba(255,255,255,0.1);}
#ctx-menu .del{color:#FF6B6B;}
</style>
</head>
<body>

<div id="room-wrap">
<svg id="room-bg" xmlns="http://www.w3.org/2000/svg">
<defs>
<!-- WALLPAPER PATTERNS -->
<pattern id="wp0" width="1" height="1"><rect width="1" height="1" fill="#F2E8F8"/></pattern>
<pattern id="wp1" width="22" height="22" patternUnits="userSpaceOnUse">
  <rect width="22" height="22" fill="#F0E6F5"/>
  <rect width="9" height="22" fill="#E4D8EC" opacity=".55"/>
</pattern>
<pattern id="wp2" width="26" height="26" patternUnits="userSpaceOnUse">
  <rect width="26" height="26" fill="#F5E0EE"/>

</pattern>
<pattern id="wp3" width="32" height="32" patternUnits="userSpaceOnUse">

</pattern>
<pattern id="wp4" width="28" height="28" patternUnits="userSpaceOnUse">
  <rect width="28" height="28" fill="#EEE8FF"/>
  <polygon points="14,4 15.8,10 22,10 17,13.8 19,20 14,16.2 9,20 11,13.8 6,10 12.2,10" fill="#D4CEFF" opacity=".55"/>
</pattern>
<pattern id="wp5" width="60" height="20" patternUnits="userSpaceOnUse">
  <rect width="60" height="20" fill="#CAAA7C"/>
  <line x1="0" y1="5" x2="60" y2="5" stroke="#B09060" stroke-width=".9" opacity=".5"/>

  <line x1="20" y1="0" x2="20" y2="20" stroke="#B09060" stroke-width=".5" opacity=".3"/>

  <line x1="40" y1="0" x2="40" y2="10" stroke="#A07850" stroke-width=".8" opacity=".5"/>
  <line x1="20" y1="10" x2="20" y2="20" stroke="#A07850" stroke-width=".8" opacity=".5"/>
</pattern>
<pattern id="fl1" width="9" height="9" patternUnits="userSpaceOnUse">
  <rect width="9" height="9" fill="#9070C8"/>
  <rect x="2" y="2" width="5" height="5" fill="#7A60B4" opacity=".55"/>
</pattern>
<pattern id="fl2" width="32" height="32" patternUnits="userSpaceOnUse">
  <rect width="32" height="32" fill="#EEF0F8"/>
  <rect width="15" height="15" fill="#E2E4F2"/>
  <rect x="17" y="17" width="15" height="15" fill="#E2E4F2"/>
  <rect width="32" height="32" fill="none" stroke="#D0D4E8" stroke-width="1"/>
</pattern>
<pattern id="fl3" width="64" height="32" patternUnits="userSpaceOnUse">
  <rect width="64" height="32" fill="#A8D8F8"/>

  <ellipse cx="52" cy="22" rx="13" ry="7" fill="white" opacity=".28"/>
</pattern>
<pattern id="fl4" width="18" height="18" patternUnits="userSpaceOnUse">
  <rect width="18" height="18" fill="#7EC850"/>
  <line x1="5" y1="18" x2="5" y2="10" stroke="#5BA030" stroke-width="2"/>
  <line x1="11" y1="18" x2="11" y2="8" stroke="#5BA030" stroke-width="2"/>
  <line x1="16" y1="18" x2="16" y2="12" stroke="#5BA030" stroke-width="2"/>
</pattern>
<pattern id="fl5" width="80" height="80" patternUnits="userSpaceOnUse">

  <path d="M60 0Q50 40 60 80" stroke="#E4E0F4" stroke-width="1" fill="none" opacity=".55"/>
</pattern>
<!-- GRADIENTS -->
<linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#28104A"/>
  <stop offset="100%" stop-color="#3C1A62"/>
</linearGradient>
<linearGradient id="ceilGrad" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#1A0830"/>
  <stop offset="100%" stop-color="#28104A"/>
</linearGradient>
<linearGradient id="leftShade" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#1A0830" stop-opacity=".55"/>
  <stop offset="100%" stop-color="#1A0830" stop-opacity="0"/>
</linearGradient>
<linearGradient id="rightShade" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#1A0830" stop-opacity="0"/>
  <stop offset="100%" stop-color="#1A0830" stop-opacity=".55"/>
</linearGradient>
<linearGradient id="floorDepth" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#000" stop-opacity=".18"/>
  <stop offset="100%" stop-color="#000" stop-opacity="0"/>
</linearGradient>
</defs>

<!-- Back wall -->
<rect id="back-wall" x="0" y="0" width="100%" height="63%" fill="url(#wp3)"/>
<rect x="0" y="0" width="100%" height="63%" fill="url(#wallGrad)" opacity=".38"/>
<!-- Ceiling -->
<rect x="0" y="0" width="100%" height="7.5%" fill="url(#ceilGrad)"/>
<!-- Ceiling trim line -->
<rect x="0" y="7.4%" width="100%" height=".8%" fill="rgba(255,255,255,.08)"/>
<!-- Side shading -->
<rect x="0" y="0" width="11%" height="63%" fill="url(#leftShade)"/>
<rect x="89%" y="0" width="11%" height="63%" fill="url(#rightShade)"/>
<!-- Baseboard -->
<rect id="baseboard" x="0" y="61.5%" width="100%" height="3.5%" fill="#28104A"/>
<rect x="0" y="61.5%" width="100%" height="1.2%" fill="rgba(255,255,255,.1)"/>
<!-- Floor -->
<rect id="floor-rect" x="0" y="63%" width="100%" height="37%" fill="url(#fl0)"/>
<rect x="0" y="63%" width="100%" height="37%" fill="url(#floorDepth)"/>
<!-- Floor grid lines -->
<g id="floor-grid" stroke="rgba(255,255,255,.1)" stroke-width=".7" fill="none"/>
<!-- Front trim -->
<rect x="0" y="98.5%" width="100%" height="2%" fill="#1A0830"/>
</svg>

<div id="light-ov" style="background:radial-gradient(circle at 50% 25%,rgba(255,210,120,.32) 0%,transparent 70%)"></div>

<!-- TOP BAR -->
<div id="top-bar">
  <div style="display:flex;flex-direction:column;gap:7px;pointer-events:auto">
    <div id="room-label-wrap">
      <span id="room-name" contenteditable="true" spellcheck="false">Our Room</span>
      <span style="font-size:11px;opacity:.55">✏️</span>
    </div>
    <button id="share-btn" onclick="shareRoom()">🔗 Share Room</button>

    <div id="coin-display">

<!-- SHOP TOGGLE -->
<button id="shop-toggle">🛒&nbsp; Shop</button>

<!-- SHOP PANEL -->
<div id="shop-panel">
<div id="shop-inner">
  <div id="shop-hdr">
    <h2>🛍️ Shop</h2>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="coins-info">🪙 <span id="shop-coins">500</span></div>
      <button id="close-shop" onclick="toggleShop()">✕</button>
    </div>
  </div>
  <div id="cat-tabs">
    <button class="cat-tab active" style="--tc:var(--c-furn)" onclick="switchCat('furniture',this)">🪑 Furniture</button>

/* ======= UI STATE ======= */
let curCat='furniture', shopOpen=false, drag=null, ctxTarget=null, lpTimer=null;

/* ======= INIT ======= */
function init(){
  loadState();
  renderGrid();
  renderItems();
  drawFloorLines();
  window.addEventListener('resize',drawFloorLines);
  document.addEventListener('click',e=>{if(!e.target.closest('#ctx-menu'))hideCtx();});
  requestAnimationFrame(depthLoop);
}

/* ======= STORAGE ======= */
function save(){try{localStorage.setItem('lior-room-v2',JSON.stringify({coins:S.coins,placed:S.placed,wp:S.wp,fl:S.fl,lt:S.lt,name:S.name,nid:S.nid}));}catch(e){}}
function loadState(){
  try{
    const d=JSON.parse(localStorage.getItem('lior-room-v2')||'null');
    if(d){Object.assign(S,d);}
  }catch(e){}
  updateCoins();
  document.getElementById('room-name').textContent=S.name;
  applyWP();applyFL();applyLT();
}

/* ======= ROOM CONTROLS ======= */
function applyWP(){document.getElementById('back-wall').setAttribute('fill','url(#'+WPS[S.wp]+')');document.getElementById('wp-btn').textContent='🖼 '+WPNAMES[S.wp];}
function applyFL(){document.getElementById('floor-rect').setAttribute('fill','url(#'+FLS[S.fl]+')');document.getElementById('fl-btn').textContent='🪵 '+FLNAMES[S.fl];}
function applyLT(){const l=LTS[S.lt];document.getElementById('light-ov').style.background=l.bg;document.getElementById('lt-btn').textContent='💡 '+l.n;}
function cycleWallpaper(){S.wp=(S.wp+1)%WPS.length;applyWP();save();}
function cycleFloor(){S.fl=(S.fl+1)%FLS.length;applyFL();save();}
function cycleLighting(){S.lt=(S.lt+1)%LTS.length;applyLT();save();}

/* ======= COINS ======= */
function updateCoins(){
  document.getElementById('coin-amount').textContent=S.coins;
  document.getElementById('shop-coins').textContent=S.coins;
}
function animCoins(from,to){
  const el=document.getElementById('coin-amount'),el2=document.getElementById('shop-coins');
  const dur=500,t0=performance.now();
  const tick=n=>{
    const t=Math.min(1,(n-t0)/dur),e=1-Math.pow(1-t,3);
    const v=Math.round(from+(to-from)*e);
    el.textContent=v;el2.textContent=v;
    if(t<1)requestAnimationFrame(tick);else{el.textContent=to;el2.textContent=to;}
  };
  requestAnimationFrame(tick);
  el.classList.remove('bounce');void el.offsetWidth;el.classList.add('bounce');
}
document.getElementById('earn-btn').addEventListener('click',()=>{
  snd('coin');const f=S.coins;S.coins+=50;animCoins(f,S.coins);save();coinShower();affUp();
});

/* ======= SOUND ======= */
let aCtx=null;
function getACtx(){if(!aCtx)try{aCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}if(aCtx&&aCtx.state==='suspended')aCtx.resume();return aCtx;}
function snd(t){
  const c=getACtx();if(!c)return;
  const mk=(f,type,dur,vol=0.08,delay=0)=>{
    setTimeout(()=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.type=type;o.frequency.value=f;
      g.gain.setValueAtTime(vol,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
      o.start();o.stop(c.currentTime+dur);
    },delay*1000);
  };
  if(t==='coin'){mk(880,'triangle',.3,.1);mk(1320,'triangle',.2,.08,.1);}
  else if(t==='place'){mk(440,'sine',.25,.08);mk(660,'sine',.2,.06,.08);}
  else if(t==='buy'){mk(523,'triangle',.22,.08,0);mk(659,'triangle',.22,.08,.1);mk(784,'triangle',.22,.08,.2);}
  else if(t==='del'){const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='square';o.frequency.setValueAtTime(200,c.currentTime);o.frequency.exponentialRampToValueAtTime(60,c.currentTime+.3);g.gain.setValueAtTime(.05,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.3);o.start();o.stop(c.currentTime+.3);}
}

/* ======= PARTICLES ======= */
function coinShower(){
  const L=document.getElementById('particle-layer');
  for(let i=0;i<14;i++){
    const el=document.createElement('div');el.className='coin-p';el.textContent='🪙';
    el.style.left=(28+Math.random()*44)+'vw';el.style.top=(Math.random()*20)+'px';
    el.style.animationDelay=(Math.random()*.5)+'s';el.style.fontSize=(13+Math.random()*10)+'px';
    L.appendChild(el);el.addEventListener('animationend',()=>el.remove());
  }
}
function poof(x,y){
  const L=document.getElementById('particle-layer');
  const cols=['#FF6B6B','#FFD93D','#6BCB77','#74B9FF','#C77DFF','#FF85A1'];
  for(let i=0;i<12;i++){
    const p=document.createElement('div');p.className='poof-p';
    const a=(i/12)*Math.PI*2,d=28+Math.random()*44;
    p.style.left=x+'px';p.style.top=y+'px';
    p.style.background=cols[Math.floor(Math.random()*cols.length)];
    p.style.setProperty('--tx',Math.cos(a)*d+'px');
    p.style.setProperty('--ty',Math.sin(a)*d+'px');
    L.appendChild(p);p.addEventListener('animationend',()=>p.remove());
  }
}

/* ======= SHOP ======= */
function toggleShop(){
  shopOpen=!shopOpen;
  document.getElementById('shop-panel').classList.toggle('open',shopOpen);
  document.getElementById('shop-toggle').classList.toggle('hidden',shopOpen);
}
document.getElementById('shop-toggle').addEventListener('click',toggleShop);
function switchCat(cat,btn){
  curCat=cat;
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}
function renderGrid(){
  const g=document.getElementById('items-grid');
  const items=CAT.filter(i=>i.cat===curCat);
  g.innerHTML=items.map(i=>`
    <div class="item-card${S.coins<i.cost?' cant-afford':''}" onclick="buyItem('${i.id}')">
      <span class="rarity-badge r${i.rar[0]}">${i.rar}</span>
      <div class="item-prev">${SVGS[i.id]||'<svg viewBox="0 0 60 60"><rect width="60" height="60" rx="8" fill="#444"/></svg>'}</div>
      <div class="item-name">${i.name}</div>
      <div class="item-cost">🪙 ${i.cost}</div>
    </div>`).join('');
}
function affUp(){document.querySelectorAll('.item-card').forEach(c=>{const nm=c.querySelector('.item-name').textContent;const it=CAT.find(x=>x.name===nm);if(it)c.classList.toggle('cant-afford',S.coins<it.cost);});}
function buyItem(id){
  const it=CAT.find(x=>x.id===id);if(!it||S.coins<it.cost)return;
  snd('buy');const f=S.coins;S.coins-=it.cost;animCoins(f,S.coins);save();affUp();
  const wr=document.getElementById('room-wrap').getBoundingClientRect();
  const x=wr.width/2-it.w/2,y=wr.height*0.75-it.h;
  addItem(it,x,y);toggleShop();
}

/* ======= PLACED ITEMS ======= */
function addItem(it,x,y,eid){
  const id=eid??S.nid++;
  if(!eid)S.placed.push({id,iid:it.id,x,y});
  renderItems();save();
  const el=document.getElementById('item-'+id);
  if(el){el.classList.add('settling');el.addEventListener('animationend',()=>el.classList.remove('settling'),{once:true});}
  ripple(x+it.w/2,y+it.h);snd('place');waveAv();
}
function renderItems(){
  const L=document.getElementById('items-layer');L.innerHTML='';
  S.placed.forEach(p=>{
    const it=CAT.find(x=>x.id===p.iid);if(!it)return;
    const el=document.createElement('div');
    el.className='placed-item';el.id='item-'+p.id;
    el.style.cssText=`left:${p.x}px;top:${p.y}px;width:${it.w}px;height:${it.h}px;z-index:${Math.round(p.y+it.h)}`;
    el.innerHTML=SVGS[it.id]||'';
    el.dataset.id=p.id;el.dataset.iid=it.id;el.dataset.w=it.w;el.dataset.h=it.h;
    L.appendChild(el);itemEvents(el);
  });
}
function depthLoop(){
  document.querySelectorAll('.placed-item:not(.dragging)').forEach(el=>{
    el.style.zIndex=Math.round((parseInt(el.style.top)||0)+(parseInt(el.dataset.h)||0));
  });
  requestAnimationFrame(depthLoop);
}

/* ======= DRAG ======= */
function itemEvents(el){
  el.addEventListener('mousedown',e=>{if(e.button!==0)return;e.preventDefault();iDrag(el,e.clientX,e.clientY);document.addEventListener('mousemove',mMove);document.addEventListener('mouseup',mUp);});
  el.addEventListener('touchstart',e=>{if(e.touches.length!==1)return;e.preventDefault();iDrag(el,e.touches[0].clientX,e.touches[0].clientY);document.addEventListener('touchmove',tMove,{passive:false});document.addEventListener('touchend',tUp);},{passive:false});
  el.addEventListener('contextmenu',e=>{e.preventDefault();ctxTarget=+el.dataset.id;showCtx(e.clientX,e.clientY);});
  el.addEventListener('touchstart',e=>{lpTimer=setTimeout(()=>{ctxTarget=+el.dataset.id;const t=e.touches[0];showCtx(t.clientX,t.clientY);},580);},{passive:true});
  el.addEventListener('touchend',()=>{clearTimeout(lpTimer);},{passive:true});
  el.addEventListener('touchmove',()=>{clearTimeout(lpTimer);},{passive:true});
}
function iDrag(el,cx,cy){
  hideCtx();
  const r=el.getBoundingClientRect(),wr=document.getElementById('room-wrap').getBoundingClientRect();
  drag={el,id:+el.dataset.id,ox:cx-r.left,oy:cy-r.top,wr};
  el.classList.add('dragging');el.style.zIndex=9999;
}
function mMove(e){mv(e.clientX,e.clientY);}
function tMove(e){e.preventDefault();mv(e.touches[0].clientX,e.touches[0].clientY);}
function mv(cx,cy){
  if(!drag)return;
  const{el,ox,oy,wr}=drag;
  const w=+el.dataset.w,h=+el.dataset.h;
  let x=cx-wr.left-ox,y=cy-wr.top-oy;
  x=Math.max(-w*.25,Math.min(wr.width-w*.75,x));
  y=Math.max(-h*.2,Math.min(wr.height-h*.15,y));
  el.style.left=x+'px';el.style.top=y+'px';
}
function mUp(){document.removeEventListener('mousemove',mMove);document.removeEventListener('mouseup',mUp);drop();}
function tUp(){document.removeEventListener('touchmove',tMove);document.removeEventListener('touchend',tUp);drop();}
function drop(){
  if(!drag)return;
  const{el,id}=drag;
  el.classList.remove('dragging');
  const x=parseInt(el.style.left),y=parseInt(el.style.top);
  const p=S.placed.find(p=>p.id===id);if(p){p.x=x;p.y=y;}save();
  el.classList.add('settling');el.addEventListener('animationend',()=>el.classList.remove('settling'),{once:true});
  ripple(x+(+el.dataset.w)/2,y+(+el.dataset.h));snd('place');drag=null;
}

/* ======= CONTEXT MENU ======= */
function showCtx(x,y){const m=document.getElementById('ctx-menu');m.style.left=x+'px';m.style.top=y+'px';m.classList.add('vis');}
function hideCtx(){document.getElementById('ctx-menu').classList.remove('vis');}
function deleteItem(){
  if(ctxTarget==null)return;
  const el=document.getElementById('item-'+ctxTarget);
  if(el){const r=el.getBoundingClientRect();poof(r.left+r.width/2,r.top+r.height/2);el.remove();}
  snd('del');S.placed=S.placed.filter(p=>p.id!==ctxTarget);save();ctxTarget=null;hideCtx();
}
function duplicateItem(){
  if(ctxTarget==null)return;
  const p=S.placed.find(x=>x.id===ctxTarget);if(!p)return;
  const it=CAT.find(x=>x.id===p.iid);if(!it)return;
  addItem(it,p.x+22,p.y+22);ctxTarget=null;hideCtx();
}

/* ======= RIPPLE ======= */
function ripple(x,y){
  const L=document.getElementById('items-layer');
  const r=document.createElement('div');r.className='floor-ripple';
  r.style.left=x+'px';r.style.top=y+'px';r.style.zIndex=1;
  L.appendChild(r);r.addEventListener('animationend',()=>r.remove());
}

/* ======= AVATARS ======= */
function waveAv(){
  ['fig1','fig2'].forEach((id,i)=>{
    const el=document.getElementById(id);if(!el)return;
    el.style.animation=`fbob .5s ease-in-out 4 ${i*.12}s`;
    setTimeout(()=>el.style.animation='',2200);
  });
}

/* ======= SHARE ======= */
function shareRoom(){
  const code=btoa(JSON.stringify({n:S.name,items:S.placed.map(p=>[p.iid,Math.round(p.x),Math.round(p.y)]),w:S.wp,f:S.fl,l:S.lt}));
  const txt='🏠 '+S.name+'\nlior:room:'+code;
  navigator.clipboard?.writeText(txt).then(()=>alert('Room code copied to clipboard! 📋')).catch(()=>prompt('Copy your room code:',txt));
}

/* ======= FLOOR PERSPECTIVE LINES ======= */
function drawFloorLines(){
  const svg=document.getElementById('room-bg');
  const W=svg.clientWidth||window.innerWidth,H=svg.clientHeight||window.innerHeight;
  const fy=H*.63,vx=W/2;let s='';
  for(let i=0;i<=12;i++){const x=(i/12)*W;s+=`<line x1="${vx}" y1="${fy}" x2="${x}" y2="${H}"/>`;}
  for(let i=1;i<=5;i++){const t=i/5,y=fy+(H-fy)*Math.pow(t,1.4),sp=.45+t*.55;s+=`<line x1="${vx-vx*sp}" y1="${y}" x2="${vx+vx*sp}" y2="${y}"/>`;}
  document.getElementById('floor-grid').innerHTML=s;
}

/* ======= ROOM NAME ======= */
document.getElementById('room-name').addEventListener('blur',()=>{S.name=document.getElementById('room-name').textContent.trim()||'Our Room';save();});

/* ======= EXPOSE ======= */
window.cycleWallpaper=cycleWallpaper;window.cycleFloor=cycleFloor;window.cycleLighting=cycleLighting;
window.switchCat=switchCat;window.buyItem=buyItem;window.deleteItem=deleteItem;
window.duplicateItem=duplicateItem;window.toggleShop=toggleShop;window.shareRoom=shareRoom;

init();
</script>
