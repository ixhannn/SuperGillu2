name = "lior-media"
main = "worker.js"
compatibility_date = "2024-01-01"

[triggers]
crons = ["*/10 * * * *"]

[[r2_buckets]]
binding = "LIOR_BUCKET"
bucket_name = "lior-media"

# Set the upload secret with:
#   wrangler secret put UPLOAD_KEY
#   wrangler secret put CLEANUP_INTERNAL_TOKEN
#   wrangler secret put SUPABASE_URL
#   wrangler secret put SUPABASE_SERVICE_ROLE_KEY
