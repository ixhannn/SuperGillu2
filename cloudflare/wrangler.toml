name = "lior-media"
main = "worker.js"
compatibility_date = "2024-01-01"

[triggers]
crons = ["*/10 * * * *"]

[[r2_buckets]]
binding = "LIOR_BUCKET"
bucket_name = "lior-media"

# Set the worker secrets with:
#   wrangler secret put CLEANUP_INTERNAL_TOKEN
#   wrangler secret put ADMIN_DASHBOARD_TOKEN
#   wrangler secret put SUPABASE_URL
#   wrangler secret put SUPABASE_SERVICE_ROLE_KEY
#   wrangler secret put MEDIA_URL_SIGNING_SECRET   # HMAC secret; MUST match the
#                                                  # sign-media edge fn's secret.
#                                                  # Verifies signed media URLs on
#                                                  # GET/HEAD. Never ship to client.
# Managed media writes are authorized with the caller's Supabase session,
# not a shared client-side upload secret. (The legacy UPLOAD_KEY /
# X-Upload-Key fallback has been removed.)
#
# Cross-origin browser access is restricted to a built-in allowlist
# (localhost dev, Capacitor WebView origins, *.joinlior.com,
# *.joinlior.workers.dev, *.pages.dev). If the web app is served from
# another domain, add it via:
#   wrangler secret put ALLOWED_ORIGINS   # comma-separated exact origins
# or a plain [vars] entry, e.g. ALLOWED_ORIGINS = "https://app.example.com"
